name: Natural Random Streak

on:
  schedule:
    - cron: '15 18 * * *' # Roz raat ko automatic chalega
  workflow_dispatch: # Taaki tum manually bhi run karke test kar sako

jobs:
  make-contribution:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Updated to v4 to fix deprecation

      - name: Make Random Changes
        run: |
          # Seed random generator using current timestamp
          RANDOM=$(date +%s)
          # 30% chance to skip commit for natural look
          if [ $((RANDOM % 10)) -lt 3 ]; then
            echo "Skipping today for natural pattern"
            exit 0
          fi
          
          # Add random numbers to a log file
          echo "Contribution activity logged at: $(date) - ID: $RANDOM" >> contribution_matrix.log

      - name: Commit and Push Changes
        run: |
          git config --local user.email "huzaix.amv@gmail.com"
          git config --local user.name "CreateHuzaifa"
          git add contribution_matrix.log
          git diff --quiet && git diff --staged --quiet || (git commit -m "Integrated smart randomizer updates" && git push)

